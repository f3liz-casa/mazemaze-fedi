mutation BookmarkPost($input: BookmarkPostInput!) {
  bookmarkPost(input: $input) {
    __typename
    ... on BookmarkPostPayload {
      post {
        id
        viewerHasBookmarked
      }
    }
    ... on InvalidInputError {
      inputPath
    }
    ... on NotAuthenticatedError {
      notAuthenticated
    }
  }
}
