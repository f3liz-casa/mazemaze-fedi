# Initiate passwordless sign-in by email. Sends a magic link to the matching account.
# Complete the flow with CompleteLoginChallenge using the token from the magic link.
mutation LoginByEmail($email: String!, $locale: Locale!, $verifyUrl: URITemplate!) {
  loginByEmail(email: $email, locale: $locale, verifyUrl: $verifyUrl) {
    __typename
    ... on LoginChallenge {
      token
    }
    ... on AccountNotFoundError {
      query
    }
  }
}
