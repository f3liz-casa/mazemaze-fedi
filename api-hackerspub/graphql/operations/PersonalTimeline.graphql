# Home/personal timeline — posts from followed accounts. Requires auth.
query PersonalTimeline(
  $after: String
  $first: Int
  $languages: [Locale!]
  $withoutShares: Boolean
) {
  personalTimeline(
    after: $after
    first: $first
    languages: $languages
    withoutShares: $withoutShares
  ) {
    edges {
      cursor
      node {
        __typename
        id
        uuid
        url
        content
        excerpt
        language
        published
        updated
        sensitive
        viewerHasBookmarked
        viewerHasShared
        actor {
          id
          handle
          name
          avatarUrl
        }
        media {
          id
          url
          type
          alt
          width
          height
          sensitive
          thumbnailUrl
        }
        engagementStats {
          replies
          shares
          reactions
          bookmarks
          quotes
        }
        reactionGroups {
          __typename
          reactors {
            totalCount
            viewerHasReacted
          }
          ... on EmojiReactionGroup {
            emoji
          }
          ... on CustomEmojiReactionGroup {
            customEmoji {
              id
              name
              imageUrl
            }
          }
        }
        replyTarget {
          __typename
          id
          uuid
          url
          actor {
            handle
            name
          }
        }
        sharedPost {
          __typename
          id
          uuid
          url
          content
          excerpt
          published
          language
          actor {
            handle
            name
            avatarUrl
          }
          media {
            id
            url
            type
            alt
            thumbnailUrl
          }
          ... on Article {
            slug
            publishedYear
          }
          ... on Note {
            visibility
          }
        }
        ... on Article {
          slug
          publishedYear
        }
        ... on Note {
          visibility
          sourceId
        }
        ... on Question {
          poll {
            id
            closed
            ends
            multiple
            viewerHasVoted
            options {
              index
              title
              viewerHasVoted
              votes {
                totalCount
              }
            }
          }
        }
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}
