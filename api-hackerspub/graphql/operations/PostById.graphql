# Resolve a post by its Relay global id via the Node interface. Same selection
# as PostByUrl; used when a client holds an id (e.g. from a timeline card)
# rather than a URL.
query PostById($id: ID!) {
  node(id: $id) {
    __typename
    id
    ... on Post {
      uuid
      url
      content
      excerpt
      language
      published
      updated
      sensitive
      viewerHasBookmarked
      viewerHasShared
      actor {
        id
        handle
        name
        avatarUrl
      }
      media {
        id
        url
        type
        alt
        width
        height
        sensitive
        thumbnailUrl
      }
      engagementStats {
        replies
        shares
        reactions
        bookmarks
        quotes
      }
      reactionGroups {
        __typename
        reactors {
          totalCount
          viewerHasReacted
        }
        ... on EmojiReactionGroup {
          emoji
        }
        ... on CustomEmojiReactionGroup {
          customEmoji {
            id
            name
            imageUrl
          }
        }
      }
      replyTarget {
        __typename
        id
        uuid
        url
        actor {
          handle
          name
        }
      }
    }
    ... on Article {
      slug
      publishedYear
    }
    ... on Note {
      visibility
      sourceId
    }
    ... on Question {
      poll {
        id
        closed
        ends
        multiple
        viewerHasVoted
        options {
          index
          title
          viewerHasVoted
          votes {
            totalCount
          }
        }
      }
    }
  }
}
